[pytest]
# Ephemeral Trellis workspaces (the `ephemeral_trellis` fixture) live under
# pytest's tmp_path. Keep only the 2 most recent runs on disk, then let pytest
# garbage-collect older ones — enough to inspect a failure's graph without
# accumulating throwaway .trellis instances indefinitely.
tmp_path_retention_count = 2
tmp_path_retention_policy = all
norecursedirs = scripts/benchmarks
